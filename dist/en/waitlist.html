<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the waitlist | Siskin Labs</title>
    <meta name="description" content="Siskin Labs builds lightweight, intelligent software for professionals.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23f0e51b'/><text x='50' y='68' font-family='system-ui,sans-serif' font-size='55' font-weight='800' text-anchor='middle' fill='%23000'>S</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
</head>
<body>
    <header class="header">
        <div class="container header__inner">
            <a href="/en/" class="header__logo">
                <img src="/static/siskin-icon.png" alt="Siskin">
                Siskin Labs
            </a>

            <button class="nav__toggle" onclick="document.querySelector('.nav').classList.toggle('nav--open')" aria-label="Menu">
                <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18" stroke-linecap="round"/></svg>
            </button>

            <nav class="nav">
                <a href="/en/dash.html" class="nav__link ">Dash</a>
                <a href="/en/perch.html" class="nav__link ">Perch</a>
                <a href="/en/cache.html" class="nav__link ">Cache</a>
                <a href="/en/waitlist.html" class="nav__cta">Join Waitlist</a>
                <a href="/nl/" class="nav__lang">Nederlands</a>
            </nav>
        </div>
    </header>

    <main>
        
<section class="hero">
    <div class="container container--narrow">
        <h1 class="hero__title">Join the waitlist</h1>
        <p class="hero__subtitle" style="margin-bottom: 2.5rem;">Be the first to know when our tools are ready. No spam, just updates.</p>

        <form class="waitlist-form"
              hx-post="/api/waitlist"
              hx-target="#waitlist-result"
              hx-swap="innerHTML">

            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" required
                       placeholder="you@example.com">
            </div>

            <div class="form-group">
                <label for="name">Name (optional)</label>
                <input type="text" id="name" name="name"
                       placeholder="Jane Doe">
            </div>

            <div class="form-group">
                <label for="product">Interested in</label>
                <select id="product" name="product">
                    <option value="all">All products</option>
                    <option value="perch">Perch</option>
                    <option value="cache">Cache</option>
                    <option value="dash">Dash</option>
                </select>
            </div>

            <button type="submit" class="btn btn--primary btn--large btn--full">
                Join waitlist
            </button>
        </form>

        <div id="waitlist-result"></div>
    </div>
</section>

    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer__inner">
                <div class="footer__brand">
                    <div class="footer__name">Siskin Labs</div>
                    <div class="footer__tagline">Independent software studio, Amsterdam</div>
                </div>
                <div class="footer__links">
                    <div class="footer__col">
                        <h4>Products</h4>
                        <a href="/en/dash.html">Dash</a>
                        <a href="/en/perch.html">Perch</a>
                        <a href="/en/cache.html">Cache</a>
                    </div>
                    <div class="footer__col">
                        <h4>Company</h4>
                        <a href="mailto:hello@siskin.amsterdam">Contact</a>
                        <a href="/en/subscribe.html">Newsletter</a>
                    </div>
                </div>
            </div>
            <div class="footer__bottom">
                &copy; 2025 Siskin Labs. All rights reserved.
            </div>
        </div>
    </footer>
</body>
</html>
